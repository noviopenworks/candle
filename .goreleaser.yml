# GoReleaser config — https://goreleaser.com
# Run locally with `task release-snapshot`; CI publishes on a `v*` tag.
version: 2

project_name: candle

before:
  hooks:
    - go mod tidy

builds:
  - id: candle
    main: ./cmd/candle
    binary: candle
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/noviopenworks/candle/internal/version.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: candle
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^chore(comet):"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
