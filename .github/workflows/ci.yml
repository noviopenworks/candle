name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: CI gate (fmt-check, vet, lint, test, vuln)
        run: task ci

      - name: Coverage
        run: task coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: |
            coverage.out
            coverage.html
          if-no-files-found: warn
